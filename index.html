<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout PIX</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background-color: #28a745; color: white; border: none; padding: 10px; cursor: pointer; width: 100%; }
        .btn:hover { background-color: #218838; }
        .pix-info { margin-top: 20px; }
        img { max-width: 100%; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pagamento via PIX</h2>
        <input type="text" id="name" placeholder="Digite seu nome" required>
        <input type="email" id="email" placeholder="Digite seu e-mail" required>
        <button id="gerarPix" class="btn">Gerar Chave PIX</button>
        <div class="pix-info"></div>
    </div>

    <script>
        document.getElementById('gerarPix').addEventListener('click', async function() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;

            if (!name || !email) {
                alert("Por favor, preencha seu nome e e-mail.");
                return;
            }

            const amount = 20.00; // Valor fixo do pagamento
            const token = "13130|t55kdxjIHj00mgNoOfqP67tl7mLZWr1h0fryiKxZe430a5d6"; // Substitua pelo seu token da PushinPay

            const requestData = {
                token: token,
                nome: name,
                email: email,
                valor: amount.toFixed(2),
                descricao: "Acesso ao site ArteAtalho.com"
            };

            try {
                const response = await fetch("https://api.pushinpay.com.br/v1/pagamentos/pix", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(requestData)
                });

                const data = await response.json();

                if (data.status === "success") {
                    document.querySelector('.pix-info').innerHTML = `
                        <p>Escaneie o QR Code ou copie a chave PIX abaixo para pagamento:</p>
                        <img src="${data.qrcode_image}" alt="QR Code PIX">
                        <p><strong>Chave PIX:</strong> ${data.qrcode_text}</p>
                    `;
                } else {
                    alert("Erro ao gerar pagamento PIX: " + data.message);
                }
            } catch (error) {
                alert("Erro na requisição: " + error.message);
            }
        });
    </script>

</body>
</html>
