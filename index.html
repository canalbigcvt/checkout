<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout PIX</title>
    <style>
        /* Reset e variáveis */
        :root {
            --primary: #00a3ff;
            --primary-dark: #0081ccc;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-700: #374151;
            --gray-800: #1f2937;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        /* Layout principal */
        body {
            background-color: var(--gray-100);
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--gray-800);
            font-size: 1.875rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--gray-700);
            font-size: 1rem;
        }

        /* Card principal */
        .card {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Produto */
        .product {
            display: flex;
            align-items: center;
            padding: 1rem;
            background: var(--gray-100);
            border-radius: 0.75rem;
            margin-bottom: 2rem;
        }

        .product-image {
            width: 80px;
            height: 80px;
            border-radius: 0.5rem;
            object-fit: cover;
            margin-right: 1rem;
        }

        .product-info h2 {
            font-size: 1.125rem;
            color: var(--gray-800);
            margin-bottom: 0.25rem;
        }

        .product-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-800);
        }

        /* Formulário */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--gray-200);
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 163, 255, 0.1);
        }

        /* Botão */
        .btn {
            display: block;
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        /* PIX Info */
        .pix-info {
            margin-top: 1.5rem;
            text-align: center;
            padding: 1rem;
            background: var(--gray-100);
            border-radius: 0.5rem;
        }

        .pix-info img {
            width: 40px;
            height: 40px;
            margin-bottom: 0.5rem;
        }

        .pix-info p {
            color: var(--gray-700);
            font-size: 0.875rem;
        }

        /* Responsividade */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }

            .product {
                flex-direction: column;
                text-align: center;
            }

            .product-image {
                margin-right: 0;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Finalizar Compra</h1>
            <p>Complete seus dados para receber o acesso</p>
        </header>

        <div class="card">
            <!-- Produto -->
            <div class="product">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80" alt="Curso" class="product-image">
                <div class="product-info">
                    <h2>Curso Completo de Marketing Digital</h2>
                    <div class="product-price">R$ 297,00</div>
                </div>
            </div>

            <!-- Formulário -->
            <form id="checkoutForm">
                <div class="form-group">
                    <label for="name" class="form-label">Nome completo</label>
                    <input type="text" id="name" class="form-input" required placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email" class="form-label">E-mail</label>
                    <input type="email" id="email" class="form-input" required placeholder="Digite seu melhor e-mail">
                </div>

                <input type="hidden" id="pixAmount" value="297.00">

                <button type="submit" class="btn">Gerar Chave PIX</button>

                <div class="pix-info">
                    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiMwMGEzZmYiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cGF0aCBkPSJNMTIgMkwyCiAxM2wxMCAxMSAxMC0xMXoiLz48L3N2Zz4=" alt="PIX">
                    <p>Após clicar no botão, você receberá a chave PIX para pagamento</p>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const amount = document.getElementById('pixAmount').value; // Captura o valor do PIX
            
            try {
                // Enviar a requisição para a API da PushinPay
                const response = await fetch('https://api.pushinpay.com/v1/pix', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'sBPca5VQ0c61lepIhtWD3e77U7KABgwzya8C2aIt3f650fa6
' // Substitua pelo seu token da PushinPay
                    },
                    body: JSON.stringify({
                        amount: amount,
                        description: 'Curso Completo de Marketing Digital',
                        customer: {
                            name: name,
                            email: email
                        }
                    })
                });

                // Verificar se a resposta é válida
                if (!response.ok) {
                    throw new Error('Erro ao gerar chave PIX. Tente novamente mais tarde.');
                }

                const data = await response.json();

                // Verificar se o QR Code foi retornado
                if (data.qrcode) {
                    alert(`Seu pagamento PIX foi gerado! Use o código: ${data.qrcode}`);
                } else {
                    alert('Erro ao gerar pagamento. Tente novamente.');
                }
            } catch (error) {
                alert(error.message);
            }
        });
    </script>
</body>
</html>
