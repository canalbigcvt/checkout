<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout PIX</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --background: #F3F4F6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--background);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .checkout-container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        .checkout-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .checkout-header h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .price {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
            margin: 1rem 0;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #D1D5DB;
            border-radius: 0.5rem;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--primary-dark);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .pix-container {
            display: none;
            text-align: center;
            margin-top: 2rem;
        }

        .pix-container img {
            max-width: 200px;
            margin: 1rem auto;
        }

        .pix-code {
            background: #F3F4F6;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            margin: 1rem 0;
            word-break: break-all;
        }

        .copy-button {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
        }

        .copy-button:hover {
            background: var(--primary);
            color: white;
        }

        .success-message {
            display: none;
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            background: #DEF7EC;
            color: #03543F;
            border-radius: 0.5rem;
        }

        .product-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <h1>Finalizar Compra</h1>
            <div class="price">R$ <span id="price">1,00</span></div>
        </div>

        <form id="checkout-form">
            <div class="form-group">
                <label for="fullName">Nome Completo</label>
                <input type="text" id="fullName" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required>
            </div>

            <button type="submit" class="btn">Pagar com PIX</button>
        </form>

        <div class="pix-container" id="pixContainer">
            <h2>Escaneie o QR Code</h2>
            <img id="qrCode" alt="QR Code PIX">
            <p>Ou copie o código PIX abaixo:</p>
            <div class="pix-code" id="pixCode"></div>
            <button class="copy-button" onclick="copyPixCode()">Copiar código PIX</button>
        </div>

        <div class="success-message" id="successMessage">
            <h2>Pagamento Confirmado!</h2>
            <p>Acesse seu produto digital através do link abaixo:</p>
            <a href="#" class="product-link" id="productLink">Acessar Produto</a>
        </div>
    </div>

    <script>
        // Configuração do Mercado Pago (com sua chave de teste)
        const mp = new MercadoPago('APP_USR-4429111230022333-010606-345cd99e3803d0955ac386596b54a3f4-535512320', {
            locale: 'pt-BR'
        });

        // Valor do produto
        const PRODUCT_PRICE = 1.00;

        // Evento do formulário de checkout
        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;

    try {
        // Criar pagamento PIX via API do Mercado Pago
        const response = await fetch('https://api.mercadopago.com/v1/payments', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer APP_USR-4429111230022333-010606-345cd99e3803d0955ac386596b54a3f4-535512320',  // Sua chave de acesso
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                transaction_amount: PRODUCT_PRICE,
                payment_method_id: 'pix',
                payer: {
                    email: email,
                    first_name: fullName.split(' ')[0],
                    last_name: fullName.split(' ').slice(1).join(' ')
                }
            })
        });

        const data = await response.json();

        if (!response.ok) {
            // Exibir mensagem detalhada do erro da API
            console.error('Erro ao gerar pagamento:', data);
            alert(`Erro ao gerar o PIX: ${data.message || 'Erro desconhecido. Tente novamente mais tarde.'}`);
            return;
        }

        // Exibir QR Code e código PIX
        if (data.point_of_interaction && data.point_of_interaction.transaction_data) {
            document.getElementById('qrCode').src = data.point_of_interaction.transaction_data.qr_code_base64;
            document.getElementById('pixCode').textContent = data.point_of_interaction.transaction_data.qr_code;
            document.getElementById('pixContainer').style.display = 'block';

            // Verificar status do pagamento
            checkPaymentStatus(data.id);
        } else {
            alert('Erro ao gerar o código PIX.');
        }

    } catch (error) {
        console.error('Erro ao gerar PIX:', error);
        alert(`Erro ao gerar o PIX: ${error.message || 'Tente novamente mais tarde.'}`);
    }
});


        // Função para copiar o código PIX
        function copyPixCode() {
            const pixCode = document.getElementById('pixCode').textContent;
            navigator.clipboard.writeText(pixCode);
            alert('Código PIX copiado!');
        }

        // Função para verificar o status do pagamento
        async function checkPaymentStatus(paymentId) {
            const checkStatus = async () => {
                try {
                    const response = await fetch(`https://api.mercadopago.com/v1/payments/${paymentId}`, {
                        headers: {
                            'Authorization': 'Bearer APP_USR-4429111230022333-010606-345cd99e3803d0955ac386596b54a3f4-535512320'
                        }
                    });

                    const data = await response.json();

                    if (data.status === 'approved') {
                        document.getElementById('pixContainer').style.display = 'none';
                        document.getElementById('successMessage').style.display = 'block';
                        document.getElementById('productLink').href = 'https://t.me/allancs_bot';
                    }

                } catch (error) {
                    console.error('Erro ao verificar status:', error);
                }
            };

            const interval = setInterval(async () => {
                const isApproved = await checkStatus();
                if (isApproved) {
                    clearInterval(interval);
                }
            }, 5000);
        }
    </script>
</body>
</html>
