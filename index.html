<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout PIX</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        /* Estilos do checkout */
        :root {
            --primary: #8B5CF6;
            --primary-dark: #7C3AED;
            --background: #F3F4F6;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background-color: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .checkout-container {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        .checkout-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .checkout-header h1 {
            color: var(--primary);
        }
        .price {
            font-size: 2rem;
            color: var(--primary);
            font-weight: bold;
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: var(--primary-dark);
        }
        .pix-container {
            display: none;
            text-align: center;
            margin-top: 2rem;
        }
        .pix-code {
            background: #F3F4F6;
            padding: 1rem;
            border-radius: 0.5rem;
            font-family: monospace;
            margin: 1rem 0;
            word-break: break-all;
        }
        .copy-button {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
        }
        .copy-button:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="checkout-container">
        <div class="checkout-header">
            <h1>Finalizar Compra</h1>
            <div class="price">R$ <span id="price">1,00</span></div>
        </div>

        <form id="checkout-form">
            <div>
                <label for="fullName">Nome Completo</label>
                <input type="text" id="fullName" required>
            </div>

            <div>
                <label for="email">E-mail</label>
                <input type="email" id="email" required>
            </div>

            <button type="submit" class="btn">Pagar com PIX</button>
        </form>

        <div class="pix-container" id="pixContainer">
            <h2>Escaneie o QR Code</h2>
            <img id="qrCode" alt="QR Code PIX">
            <p>Ou copie o código PIX abaixo:</p>
            <div class="pix-code" id="pixCode"></div>
            <button class="copy-button" onclick="copyPixCode()">Copiar código PIX</button>
        </div>

        <div class="success-message" id="successMessage">
            <h2>Pagamento Confirmado!</h2>
            <p>Acesse seu produto digital através do link abaixo:</p>
            <a href="https://t.me/allancs_bot" class="product-link" id="productLink">Acessar Produto</a>
        </div>
    </div>

    <script>
        // Configuração do Mercado Pago - usando a chave de sandbox
        const mp = new MercadoPago('APP_USR-c3dbca07-5326-4ab6-bc75-9fdd77b6b282');  // Chave sandbox

        // Valor do produto
        const PRODUCT_PRICE = 1.00;

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;

            try {
                // Criar pagamento PIX
                const response = await fetch('https://api.mercadopago.com/v1/payments', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer APP_USR-c3dbca07-5326-4ab6-bc75-9fdd77b6b282', // Chave sandbox
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        transaction_amount: PRODUCT_PRICE,
                        payment_method_id: 'pix',
                        payer: {
                            email: email,
                            first_name: fullName.split(' ')[0],
                            last_name: fullName.split(' ').slice(1).join(' ')
                        }
                    })
                });

                const data = await response.json();

                // Mostrar QR Code e código PIX
                document.getElementById('qrCode').src = data.point_of_interaction.transaction_data.qr_code_base64;
                document.getElementById('pixCode').textContent = data.point_of_interaction.transaction_data.qr_code;
                document.getElementById('pixContainer').style.display = 'block';

                // Iniciar verificação do status do pagamento
                checkPaymentStatus(data.id);

            } catch (error) {
                console.error('Erro ao gerar PIX:', error);
                alert('Erro ao gerar o PIX. Por favor, tente novamente.');
            }
        });

        function copyPixCode() {
            const pixCode = document.getElementById('pixCode').textContent;
            navigator.clipboard.writeText(pixCode);
            alert('Código PIX copiado!');
        }

        async function checkPaymentStatus(paymentId) {
            const checkStatus = async () => {
                try {
                    const response = await fetch(`https://api.mercadopago.com/v1/payments/${paymentId}`, {
                        headers: {
                            'Authorization': 'Bearer APP_USR-c3dbca07-5326-4ab6-bc75-9fdd77b6b282' // Chave sandbox
                        }
                    });

                    const data = await response.json();

                    if (data.status === 'approved') {
                        document.getElementById('pixContainer').style.display = 'none';
                        document.getElementById('successMessage').style.display = 'block';
                        return true;
                    }

                    return false;

                } catch (error) {
                    console.error('Erro ao verificar status:', error);
                    return false;
                }
            };

            // Verificar a cada 5 segundos
            const interval = setInterval(async () => {
                const isApproved = await checkStatus();
                if (isApproved) {
                    clearInterval(interval);
                }
            }, 5000);
        }
    </script>
</body>
</html>
